[pytest]
# Configuration for BDD tests only
testpaths = tests/step_defs
python_files = test_*.py
addopts = 
    -v
    --tb=short
# Don't enforce coverage for integration tests
# BDD tests are API integration tests, not unit tests

# Register custom marks to avoid warnings
markers =
    smoke: Critical path tests (run these first)
    critical: Most important user flows
    error: Error handling scenarios
    edge_case: Edge case and boundary testing

# Filter out deprecation warnings from gherkin library
filterwarnings =
    ignore::DeprecationWarning:gherkin.*

