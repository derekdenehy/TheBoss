[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Exclude BDD tests from unit test coverage (they're integration tests)
# Run BDD tests separately with: pytest -c pytest-bdd.ini
norecursedirs = tests/step_defs tests/features
addopts = 
    -v
    --cov=ai_agent
    --cov=scraper
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    --cov-fail-under=80

# Register custom marks to avoid warnings
markers =
    smoke: Critical path tests (run these first)
    critical: Most important user flows
    error: Error handling scenarios
    edge_case: Edge case and boundary testing
